name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [krouter-release]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Fetch latest CHANGELOG
        run: |
          curl -sS \
            https://raw.githubusercontent.com/kinthaiofficial/krouter/main/CHANGELOG.md \
            -o /tmp/changelog.md || true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy data directory
        run: |
          mkdir -p dist/data
          echo '{}' > dist/data/.gitkeep

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: krouter-site-dist
          path: dist/
          retention-days: 30
