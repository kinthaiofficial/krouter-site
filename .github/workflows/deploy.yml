name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [krouter-release]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Fetch latest CHANGELOG
        run: |
          curl -sS \
            https://raw.githubusercontent.com/kinthaiofficial/krouter/main/CHANGELOG.md \
            -o /tmp/changelog.md || true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy data directory
        run: |
          mkdir -p dist/data
          # token_price_sub.json is synced separately by sync-pricing.yml
          # Place a stub if not present so nginx can serve a 404 cleanly
          echo '{}' > dist/data/.gitkeep

      - name: Deploy via rsync over SSH
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: dist/
          remote_path: /var/www/krouter.kinthai.ai/
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY }}
